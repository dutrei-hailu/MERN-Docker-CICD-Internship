# Day 5 — Production architecture with Nginx LB, monitoring, and backend replicas
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  mongodb:
    image: mongo:7
    container_name: mern-mongodb
    restart: unless-stopped
    networks:
      - mern_network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend-1:
    build:
      context: ./mern/backend
      dockerfile: Dockerfile
    container_name: mern-backend-1
    restart: unless-stopped
    networks:
      - mern_network
    environment:
      PORT: 5050
      MONGO_URI: mongodb://mongodb:27017/employees?directConnection=true
      MONGODB_DB_NAME: employees
      INSTANCE_ID: backend-1
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-2:
    build:
      context: ./mern/backend
      dockerfile: Dockerfile
    container_name: mern-backend-2
    restart: unless-stopped
    networks:
      - mern_network
    environment:
      PORT: 5050
      MONGO_URI: mongodb://mongodb:27017/employees?directConnection=true
      MONGODB_DB_NAME: employees
      INSTANCE_ID: backend-2
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./mern/frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    container_name: mern-frontend
    restart: unless-stopped
    networks:
      - mern_network
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: mern-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mern_network
    depends_on:
      - frontend
      - backend-1
      - backend-2
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: mern-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mern_network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - backend-1
      - backend-2

  grafana:
    image: grafana/grafana:10.4.0
    container_name: mern-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - mern_network
    depends_on:
      - prometheus

networks:
  mern_network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
