global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "mern-backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "backend-1:5050"
          - "backend-2:5050"
        labels:
          service: "mern-backend"

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]
    metrics_path: /nginx-health
