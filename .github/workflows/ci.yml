name: CI Pipeline

on:
  pull_request:
    branches:
      - compose

  push:
    branches:
      - compose


jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm


    - name: Install Backend Dependencies
      working-directory: ./mern/backend
      run: npm install


    - name: Install Frontend Dependencies
      working-directory: ./mern/frontend
      run: npm install


    - name: Run Backend Tests
      working-directory: ./mern/backend
      run: npm test


    - name: Run Frontend Lint
      working-directory: ./mern/frontend
      run: npm run lint



  build-and-push:

    needs: test

    if: github.event_name == 'push' && github.ref == 'refs/heads/compose'

    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3


    - name: Build and Push Backend Image
      uses: docker/build-push-action@v6
      with:
        context: ./mern/backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max


    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v6
      with:
        context: ./mern/frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max