name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - production
  push:
    branches:
      - main
      - production

env:
  REGISTRY: docker.io

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            mern/backend/package-lock.json
            mern/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./mern/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./mern/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./mern/frontend
        run: npm run lint

      - name: Test backend
        working-directory: ./mern/backend
        run: npm test

      - name: Build frontend
        working-directory: ./mern/frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract image metadata
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./mern/backend
          file: ./mern/backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/backend-app:latest
            ${{ secrets.DOCKER_USERNAME }}/backend-app:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./mern/frontend
          file: ./mern/frontend/Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest
            ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ steps.meta.outputs.sha_tag }}
          build-args: |
            VITE_API_URL=http://localhost
          cache-from: type=gha
          cache-to: type=gha,mode=max
