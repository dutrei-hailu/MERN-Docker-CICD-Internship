name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, compose]
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: mern-backend
  FRONTEND_IMAGE: mern-frontend

jobs:
  # ── Job 1: Lint & Test (runs on every PR and push) ──────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checkout — clone the repository at the triggering commit
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js with npm cache for faster installs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: |
            mern/backend/package-lock.json
            mern/frontend/package-lock.json

      # ── Backend ──
      - name: Install backend dependencies
        working-directory: mern/backend
        run: npm ci

      - name: Run backend tests
        working-directory: mern/backend
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/employees_test?directConnection=true
          MONGODB_DB_NAME: employees_test
        run: npm test

      # ── Frontend ──
      - name: Install frontend dependencies
        working-directory: mern/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: mern/frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: mern/frontend
        run: npm test

      - name: Build frontend
        working-directory: mern/frontend
        run: npm run build

  # ── Job 2: Build & Push Docker images (only on merge to main) ───────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata tags
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: mern/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:sha-${{ steps.meta.outputs.sha_short }}

      - name: Build and push frontend production image
        uses: docker/build-push-action@v5
        with:
          context: mern/frontend
          file: mern/frontend/Dockerfile.prod
          build-args: |
            VITE_API_URL=
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:sha-${{ steps.meta.outputs.sha_short }}

  # ── Job 3: Deploy to Render (only on merge to main) ─────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not configured — skipping deploy"
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
