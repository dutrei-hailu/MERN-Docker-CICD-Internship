services:
  mongodb:
    image: mongo:7
    container_name: mern-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - mern_network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./mern/backend
      dockerfile: Dockerfile
    container_name: mern-backend
    restart: unless-stopped
    ports:
      - "5050:5050"
    networks:
      - mern_network
    environment:
      PORT: 5050
      MONGO_URI: mongodb://mongodb:27017/employees?directConnection=true
      MONGODB_DB_NAME: employees
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./mern/frontend
      dockerfile: Dockerfile
    container_name: mern-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    networks:
      - mern_network
    environment:
      VITE_API_URL: http://localhost:5050
    depends_on:
      backend:
        condition: service_healthy

networks:
  mern_network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
