# Day 2 — Run from Docker Hub images only (no local source code required)
# Prerequisites: images already pushed to Docker Hub
#
# Usage:
#   export DOCKERHUB_USERNAME=your-dockerhub-username
#   docker compose -f docker-compose.hub.yml up -d
#
# Access: http://localhost

services:
  mongodb:
    image: mongo:7
    container_name: mern-mongodb
    restart: unless-stopped
    networks:
      - mern_network
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ${DOCKERHUB_USERNAME}/mern-backend:latest
    container_name: mern-backend
    restart: unless-stopped
    networks:
      - mern_network
    environment:
      PORT: 5050
      MONGO_URI: mongodb://mongodb:27017/employees?directConnection=true
      MONGODB_DB_NAME: employees
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${DOCKERHUB_USERNAME}/mern-frontend:latest
    container_name: mern-frontend
    restart: unless-stopped
    networks:
      - mern_network
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    container_name: mern-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-hub.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mern_network
    depends_on:
      - frontend
      - backend

networks:
  mern_network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
